// ── HOOK ─────────────────────────────────────────────────────────────────────

function useAdaptiveMBTI() {
  const [si,setSi]=useState(0), [qi,setQi]=useState(0);
  const [ans,setAns]=useState({EI:[],SN:[],TF:[],JP:[],AT:[]});
  const [confirmed,setConfirmed]=useState({});
  const [finalType,setFinalType]=useState(null);
  const [done,setDone]=useState(false);

  const spectrum=SPECTRUMS[si];
  const question=done?null:QUESTIONS[spectrum]?.[qi];

  const advance=useCallback((type,newConf)=>{
    const next=si+1;
    if(next>=SPECTRUMS.length){
      setFinalType(`${newConf.EI}${newConf.SN}${newConf.TF}${newConf.JP}-${newConf.AT}`);
      setDone(true);
    } else { setSi(next); setQi(0); }
  },[si]);

  const handleAnswer=useCallback((ab)=>{
    const q=QUESTIONS[spectrum][qi];
    const t=ab==='A'?q.optionA.type:q.optionB.type;
    const prev=ans[spectrum]||[];
    const next=[...prev,t];
    setAns(a=>({...a,[spectrum]:next}));
    if(qi===0){setQi(1);return;}
    if(qi===1){
      if(next[0]===next[1]){const c={...confirmed,[spectrum]:next[0]};setConfirmed(c);advance(next[0],c);}
      else setQi(2);
      return;
    }
    const cnt=next.filter(x=>x===next[0]).length;
    const winner=cnt>=2?next[0]:next[1];
    const c={...confirmed,[spectrum]:winner};setConfirmed(c);advance(winner,c);
  },[spectrum,qi,ans,confirmed,advance]);

  const reset=useCallback(()=>{
    setSi(0);setQi(0);setAns({EI:[],SN:[],TF:[],JP:[],AT:[]});
    setConfirmed({});setFinalType(null);setDone(false);
  },[]);

  return {spectrum,question,qi,si,confirmed,done,finalType,handleAnswer,reset};
}

// ── PROGRESS BAR ─────────────────────────────────────────────────────────────

function ProgressBar({si,qi,confirmed}){
  return(
    <div style={{padding:'14px 16px 6px',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        {SPECTRUMS.map((s,i)=>{
          const done=confirmed[s]!==undefined;
          const active=i===si&&!done;
          const m=SPECTRUM_META[s];
          return(
            <React.Fragment key={s}>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
                <div style={{width:30,height:30,borderRadius:'50%',display:'flex',alignItems:'center',
                  justifyContent:'center',fontSize:13,fontWeight:900,transition:'all .3s',
                  background:done?m.color:active?`${m.color}33`:'rgba(255,255,255,0.05)',
                  border:active?`2px solid ${m.color}`:done?'none':'2px solid rgba(255,255,255,0.1)',
                  transform:active?'scale(1.15)':'scale(1)',
                  boxShadow:active?`0 0 10px ${m.color}88`:'none',
                  color:done?'#fff':active?m.color:'#4b5563'}}>
                  {done?'✓':m.icon}
                </div>
                <span style={{fontSize:9,marginTop:2,fontWeight:700,
                  color:active?m.color:done?m.color:'#4b5563'}}>{s}</span>
              </div>
              {i<4&&<div style={{flex:1,height:2,margin:'0 3px',
                background:i<si?SPECTRUM_META[SPECTRUMS[i]].color:'rgba(255,255,255,0.1)',
                transition:'background .3s'}}/>}
            </React.Fragment>
          );
        })}
      </div>
      <div style={{textAlign:'center',fontSize:11,color:'#6b7280'}}>
        {SPECTRUM_META[SPECTRUMS[si]]?.label} — Q{qi+1}
      </div>
    </div>
  );
}

// ── QUESTION CARD ─────────────────────────────────────────────────────────────

const SWIPE_THRESHOLD=85;

function QuestionCard({question,spectrum,onAnswer}){
  const [offset,setOffset]=useState({x:0,y:0});
  const [drag,setDrag]=useState(false);
  const [leaving,setLeaving]=useState(null);
  const start=useRef({x:0,y:0});
  const m=SPECTRUM_META[spectrum];

  const pd=(cx,cy)=>{setDrag(true);start.current={x:cx,y:cy};};
  const pm=(cx,cy)=>{if(!drag)return;setOffset({x:cx-start.current.x,y:(cy-start.current.y)*.25});};

  const trigger=useCallback((ab)=>{
    if(leaving)return;
    setLeaving(ab);
    setTimeout(()=>{setOffset({x:0,y:0});setLeaving(null);onAnswer(ab);},360);
  },[leaving,onAnswer]);

  const pu=useCallback(()=>{
    if(!drag)return;
    setDrag(false);
    if(offset.x>SWIPE_THRESHOLD)trigger('A');
    else if(offset.x<-SWIPE_THRESHOLD)trigger('B');
    else setOffset({x:0,y:0});
  },[drag,offset.x,trigger]);

  const rot=offset.x*.07;
  const aOp=Math.min(1,Math.max(0,offset.x/SWIPE_THRESHOLD));
  const bOp=Math.min(1,Math.max(0,-offset.x/SWIPE_THRESHOLD));

  let cs={transform:`translate(${offset.x}px,${offset.y}px) rotate(${rot}deg)`,
    transition:drag?'none':'transform .28s cubic-bezier(.34,1.56,.64,1)'};
  if(leaving==='A') cs={transform:'translate(130%,-20px) rotate(25deg)',opacity:0,
    transition:'transform .36s ease-in,opacity .36s ease-in',pointerEvents:'none'};
  if(leaving==='B') cs={transform:'translate(-130%,-20px) rotate(-25deg)',opacity:0,
    transition:'transform .36s ease-in,opacity .36s ease-in',pointerEvents:'none'};

  if(!question)return null;
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',padding:'0 16px 16px',minHeight:0}}>
      <div className="swipe-card" style={{width:'100%',maxWidth:380,...cs}}
        onMouseDown={e=>pd(e.clientX,e.clientY)}
        onMouseMove={e=>{if(drag)pm(e.clientX,e.clientY);}}
        onMouseUp={pu} onMouseLeave={pu}
        onTouchStart={e=>pd(e.touches[0].clientX,e.touches[0].clientY)}
        onTouchMove={e=>{e.preventDefault();pm(e.touches[0].clientX,e.touches[0].clientY);}}
        onTouchEnd={pu}>
        {/* A indicator */}
        <div style={{position:'absolute',top:12,left:12,zIndex:20,padding:'4px 10px',borderRadius:20,
          background:'linear-gradient(135deg,#5acea0,#2ecc71)',color:'#fff',fontSize:13,fontWeight:900,
          opacity:aOp,transform:`scale(${.8+aOp*.2})`,border:'2px solid rgba(255,255,255,.3)',transition:'none'}}>A ✓</div>
        {/* B indicator */}
        <div style={{position:'absolute',top:12,right:12,zIndex:20,padding:'4px 10px',borderRadius:20,
          background:'linear-gradient(135deg,#e05a5a,#e74c3c)',color:'#fff',fontSize:13,fontWeight:900,
          opacity:bOp,transform:`scale(${.8+bOp*.2})`,border:'2px solid rgba(255,255,255,.3)',transition:'none'}}>B ✓</div>
        {/* Card */}
        <div style={{borderRadius:24,padding:'22px 20px 18px',
          background:'linear-gradient(135deg,#1e1830,#2d1b50)',
          border:`1.5px solid ${m.color}44`,
          boxShadow:`0 20px 60px rgba(0,0,0,.6),0 0 30px ${m.color}22`,minHeight:210}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:6,borderRadius:20,padding:'4px 12px',
            background:`${m.color}22`,color:m.color,border:`1px solid ${m.color}44`,
            fontSize:12,fontWeight:700,marginBottom:14}}>
            <span>{m.icon}</span><span>{m.label}</span>
          </div>
          <p style={{color:'#f5efe0',fontSize:18,fontWeight:700,lineHeight:1.55,marginBottom:16}}>{question.text}</p>
          <div style={{height:1,background:`linear-gradient(90deg,transparent,${m.color}55,transparent)`,marginBottom:10}}/>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#6b7280',fontWeight:600}}>
            <span>← B を選ぶ</span><span>A を選ぶ →</span>
          </div>
        </div>
      </div>

      {/* Answer buttons */}
      <div style={{width:'100%',maxWidth:380,marginTop:12,display:'flex',flexDirection:'column',gap:10}}>
        <button onClick={()=>trigger('A')} disabled={!!leaving}
          style={{width:'100%',textAlign:'left',padding:'13px 16px',borderRadius:18,fontSize:13,
            fontWeight:500,lineHeight:1.45,background:'rgba(90,206,160,.08)',
            border:'1.5px solid rgba(90,206,160,.3)',color:'#e2fef5',cursor:'pointer'}}>
          <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',
            width:22,height:22,borderRadius:'50%',fontSize:11,fontWeight:900,
            marginRight:8,flexShrink:0,background:'rgba(90,206,160,.25)',color:'#5acea0'}}>A</span>
          {question.optionA.text}
        </button>
        <button onClick={()=>trigger('B')} disabled={!!leaving}
          style={{width:'100%',textAlign:'left',padding:'13px 16px',borderRadius:18,fontSize:13,
            fontWeight:500,lineHeight:1.45,background:'rgba(224,90,90,.08)',
            border:'1.5px solid rgba(224,90,90,.3)',color:'#fee2e2',cursor:'pointer'}}>
          <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',
            width:22,height:22,borderRadius:'50%',fontSize:11,fontWeight:900,
            marginRight:8,flexShrink:0,background:'rgba(224,90,90,.25)',color:'#e05a5a'}}>B</span>
          {question.optionB.text}
        </button>
      </div>
    </div>
  );
}

// ── RESULT SCREEN ─────────────────────────────────────────────────────────────

function TypeBadge({type}){
  const d=MBTI_TYPES[type];
  return(
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',borderRadius:12,
      background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.1)'}}>
      <span style={{fontSize:16}}>{d?.emoji||'👤'}</span>
      <div>
        <div style={{fontSize:11,fontWeight:900,color:d?.color||'#aaa'}}>{type}</div>
        <div style={{fontSize:10,color:'#9ca3af',lineHeight:1.2}}>{d?.name||''}</div>
      </div>
    </div>
  );
}

function ResultScreen({finalType,onReset}){
  const [show,setShow]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setShow(true),400);return()=>clearTimeout(t);},[]);

  const base=finalType.split('-')[0];
  const variant=finalType.split('-')[1];
  const d=MBTI_TYPES[base];
  const compat=COMPATIBILITY[base]||{good:[],bad:[]};

  return(
    <div className="no-scrollbar" style={{overflowY:'auto',height:'100%',padding:'24px 16px 48px'}}>
      <div style={{maxWidth:380,margin:'0 auto'}}>

        {/* Header */}
        <div className="anim-slide-up" style={{textAlign:'center',marginBottom:20}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 14px',borderRadius:20,
            background:'rgba(245,166,35,.1)',border:'1px solid rgba(245,166,35,.3)',marginBottom:10}}>
            <span style={{fontSize:11,fontWeight:700,color:'#f5a623',letterSpacing:3}}>RESULT</span>
          </div>
          <p style={{color:'#9ca3af',fontSize:14,marginBottom:4}}>あなたのタイプは…</p>
          <div className="gradient-text" style={{fontSize:44,fontWeight:900,letterSpacing:4}}>{finalType}</div>
          <p style={{color:d?.color,fontSize:15,fontWeight:700,marginTop:4}}>{d?.nick}</p>
        </div>

        {/* Personality illustration card */}
        <div className="anim-slide-up" style={{borderRadius:28,overflow:'hidden',marginBottom:16,
          background:`linear-gradient(145deg, ${d?.bg||'#1a1030'}, #0f0c1a)`,
          border:`2px solid ${d?.color||'#f5a623'}44`,
          boxShadow:`0 0 50px ${d?.color||'#f5a623'}33`,
          padding:'32px 20px 28px',textAlign:'center'}}>
          {/* Big emoji */}
          <div className="anim-float" style={{fontSize:90,lineHeight:1,marginBottom:16,
            filter:`drop-shadow(0 0 20px ${d?.color}88)`}}>
            {d?.emoji}
          </div>
          {/* Type badge */}
          <div style={{display:'inline-block',padding:'6px 18px',borderRadius:20,
            background:`${d?.color}22`,border:`1.5px solid ${d?.color}66`,marginBottom:10}}>
            <span style={{fontSize:22,fontWeight:900,color:d?.color,letterSpacing:3}}>{base}</span>
            <span style={{fontSize:13,color:`${d?.color}aa`,marginLeft:6}}>-{variant}</span>
          </div>
          {/* Type name */}
          <div style={{fontSize:20,fontWeight:900,color:'#f5efe0',marginBottom:4}}>{d?.name}</div>
          <div style={{fontSize:13,color:'#9ca3af'}}>{d?.nick}</div>

          {/* Decorative spectrum dots */}
          <div style={{display:'flex',justifyContent:'center',gap:6,marginTop:16}}>
            {['EI','SN','TF','JP'].map(s=>(
              <div key={s} style={{padding:'3px 8px',borderRadius:10,fontSize:10,fontWeight:700,
                background:`${SPECTRUM_META[s].color}22`,
                border:`1px solid ${SPECTRUM_META[s].color}55`,
                color:SPECTRUM_META[s].color}}>
                {finalType.includes(s[0]) ? s[0] : s[1]}
              </div>
            ))}
            <div style={{padding:'3px 8px',borderRadius:10,fontSize:10,fontWeight:700,
              background:`${SPECTRUM_META.AT.color}22`,
              border:`1px solid ${SPECTRUM_META.AT.color}55`,
              color:SPECTRUM_META.AT.color}}>-{variant}</div>
          </div>
        </div>

        {show&&<>
          {/* Variant */}
          <div className="anim-fade-in" style={{borderRadius:18,padding:'14px 16px',marginBottom:12,
            background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.08)'}}>
            <p style={{fontSize:11,fontWeight:700,color:'#6b7280',letterSpacing:2,marginBottom:6}}>
              {variant==='A'?'🛡️ 自己確信型 (Assertive)':'🌊 慎重型 (Turbulent)'}
            </p>
            <p style={{fontSize:13,color:'#d1d5db',lineHeight:1.65}}>
              {variant==='A'?d?.vA:d?.vT}
            </p>
          </div>

          {/* Description */}
          <div className="anim-fade-in" style={{borderRadius:18,padding:'14px 16px',marginBottom:12,
            background:`${d?.color}0f`,border:`1px solid ${d?.color}33`}}>
            <p style={{fontSize:11,fontWeight:700,color:d?.color,letterSpacing:1,marginBottom:6}}>キャラクター概要</p>
            <p style={{fontSize:13,color:'#e5e7eb',lineHeight:1.65}}>{d?.desc}</p>
          </div>

          {/* Compatibility */}
          <div className="anim-fade-in" style={{borderRadius:18,padding:'14px 16px',marginBottom:16,
            background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.08)'}}>
            <p style={{fontSize:11,fontWeight:700,color:'#6b7280',letterSpacing:2,marginBottom:12}}>💞 相性診断</p>
            <div style={{marginBottom:12}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
                <span style={{fontSize:13}}>💚</span>
                <span style={{fontSize:12,fontWeight:700,color:'#4ade80'}}>ベストマッチ</span>
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {compat.good.map(t=><TypeBadge key={t} type={t}/>)}
              </div>
            </div>
            <div style={{height:1,background:'rgba(255,255,255,.06)',marginBottom:12}}/>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
                <span style={{fontSize:13}}>⚠️</span>
                <span style={{fontSize:12,fontWeight:700,color:'#f87171'}}>要注意タイプ</span>
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {compat.bad.map(t=><TypeBadge key={t} type={t}/>)}
              </div>
            </div>
          </div>

          <button onClick={onReset} className="anim-fade-in"
            style={{width:'100%',padding:16,borderRadius:20,fontWeight:700,fontSize:15,cursor:'pointer',
              background:'rgba(245,166,35,.1)',border:'2px solid rgba(245,166,35,.4)',color:'#f5a623'}}>
            もう一度診断する
          </button>
        </>}
      </div>
    </div>
  );
}

// ── START SCREEN ──────────────────────────────────────────────────────────────

function StartScreen({onStart}){
  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',padding:'48px 24px',textAlign:'center',position:'relative'}}>
      <div style={{position:'absolute',top:'25%',left:'50%',transform:'translate(-50%,-50%)',
        width:280,height:280,borderRadius:'50%',opacity:.08,filter:'blur(60px)',
        background:'radial-gradient(circle,#f5a623,transparent)'}}/>
      <div style={{position:'relative',zIndex:1,maxWidth:360,width:'100%'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'5px 16px',borderRadius:20,
          background:'rgba(245,166,35,.1)',border:'1px solid rgba(245,166,35,.3)',marginBottom:20}}>
          <span style={{fontSize:11,fontWeight:700,color:'#f5a623',letterSpacing:4}}>OJISAN MBTI</span>
        </div>
        <h1 style={{fontSize:42,fontWeight:900,lineHeight:1.2,margin:'0 0 12px'}}>
          <span className="gradient-text">オジサン</span><br/>
          <span style={{color:'#f5efe0'}}>性格診断</span>
        </h1>
        <p style={{fontSize:14,color:'#9ca3af',lineHeight:1.7,margin:'0 0 16px'}}>
          あなたはどんなオジサン？<br/>
          <strong style={{color:'#f5a623'}}>16タイプ</strong>から、今すぐ診断。
        </p>
        <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:8,marginBottom:24}}>
          {['⚡ 最速60秒','🎴 16タイプ診断','💞 相性チェック'].map(f=>(
            <span key={f} style={{fontSize:12,padding:'5px 12px',borderRadius:20,
              background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',color:'#d1d5db'}}>{f}</span>
          ))}
        </div>

        {/* Stacked card preview */}
        <div style={{position:'relative',width:180,height:130,margin:'0 auto 24px'}}>
          {[3,2,1,0].map(i=>(
            <div key={i} style={{position:'absolute',inset:0,borderRadius:20,zIndex:i,
              background:'linear-gradient(135deg,#1e1830,#2d1b69)',
              border:'1px solid rgba(255,255,255,.1)',
              transform:`rotate(${(i-1.5)*3}deg) translateY(${i*3}px)`}}/>
          ))}
          <div style={{position:'absolute',inset:0,zIndex:10,display:'flex',flexDirection:'column',
            alignItems:'center',justifyContent:'center',borderRadius:20,
            background:'linear-gradient(135deg,#1e1830,#2d1b69)'}}>
            <span style={{fontSize:32,marginBottom:4}}>🍺</span>
            <span style={{fontSize:11,color:'#9ca3af',fontWeight:600}}>スワイプして回答</span>
          </div>
        </div>

        <p style={{fontSize:11,color:'#4b5563',marginBottom:14}}>← カードを左右にスワイプして回答 →</p>
        <button onClick={onStart}
          style={{width:'100%',padding:18,borderRadius:22,fontWeight:900,fontSize:18,color:'#fff',
            cursor:'pointer',background:'linear-gradient(135deg,#f5a623,#e8941a)',border:'none',
            boxShadow:'0 0 28px rgba(245,166,35,.4)'}}>
          診断スタート！
        </button>
        <p style={{fontSize:11,color:'#374151',marginTop:10}}>最大15問 • 適応式アルゴリズム採用</p>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────

function App(){
  const [screen,setScreen]=useState('start');
  const {spectrum,question,qi,si,confirmed,done,finalType,handleAnswer,reset}=useAdaptiveMBTI();

  useEffect(()=>{if(done&&screen==='quiz')setScreen('result');},[done,screen]);
  const handleReset=()=>{reset();setScreen('start');};

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',
      background:'linear-gradient(160deg,#0f0c1a 0%,#1a1030 50%,#0f0c1a 100%)'}}>
      {screen==='start'&&(
        <div style={{flex:1,overflowY:'auto'}} className="no-scrollbar">
          <StartScreen onStart={()=>setScreen('quiz')}/>
        </div>
      )}
      {screen==='quiz'&&question&&(
        <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
          <ProgressBar si={si} qi={qi} confirmed={confirmed}/>
          <QuestionCard key={question.id} question={question} spectrum={spectrum} onAnswer={handleAnswer}/>
        </div>
      )}
      {screen==='result'&&finalType&&(
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <ResultScreen finalType={finalType} onReset={handleReset}/>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
